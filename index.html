<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكرر النصوص الاحترافي | KAREEM OMAR</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6366f1;
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #10b981;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h1 { text-align: center; color: var(--primary-color); margin-bottom: 10px; }
        .stats-bar {
            background: rgba(99, 102, 241, 0.1);
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid var(--primary-color);
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        
        textarea, input, select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
            font-size: 16px;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .option-item {
            background: #334155;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

        .option-item.active { background: var(--primary-color); }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: var(--primary-color);
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { opacity: 0.9; transform: translateY(-2px); }

        .output-area {
            margin-top: 20px;
            position: relative;
        }

        #resultText {
            height: 200px;
            background: #020617;
            border: 1px dashed var(--primary-color);
        }

        .action-btns {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-secondary { background: #475569; font-size: 14px; }
        .btn-whatsapp { background: #25d366; font-size: 14px; }

        footer {
            margin-top: 30px;
            text-align: center;
            font-size: 14px;
            color: #94a3b8;
        }

        footer a { color: var(--primary-color); text-decoration: none; margin: 0 10px; }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--accent-color);
            padding: 10px 20px;
            border-radius: 8px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>مكرر النصوص الذكي 🚀</h1>
        
        <div class="stats-bar">
            إجمالي الحروف التي وُلدت بواسطة المستخدمين: <span id="globalCount">جارِ التحميل...</span> حرف
        </div>

        <div class="input-group">
            <label>اكتب النص هنا:</label>
            <textarea id="inputText" placeholder="مثال: سبحان الله وبحمده"></textarea>
        </div>

        <div class="controls">
            <div class="input-group">
                <label>عدد التكرار:</label>
                <input type="number" id="repeatCount" value="10" min="1">
            </div>
            <div class="input-group">
                <label>الفاصل بين الجمل:</label>
                <select id="separator">
                    <option value="\n">سطر جديد</option>
                    <option value=" ">مسافة</option>
                    <option value=" - ">شرطة (-)</option>
                    <option value=" * ">نجمة (*)</option>
                </select>
            </div>
        </div>

        <div class="options">
            <div class="option-item" onclick="this.classList.toggle('active')" id="optNumbering">إضافة ترقيم</div>
            <div class="option-item" onclick="this.classList.toggle('active')" id="optUppercase">حروف كبيرة (EN)</div>
            <div class="option-item" onclick="this.classList.toggle('active')" id="optReverse">عكس النص</div>
        </div>

        <button onclick="processText()">توليد وتكرار النص ✨</button>

        <div class="output-area">
            <label>النتيجة (عدد الحروف: <span id="charCount">0</span>):</label>
            <textarea id="resultText" readonly></textarea>
            
            <div class="action-btns">
                <button class="btn-secondary" onclick="copyText()">نسخ النص 📋</button>
                <button class="btn-whatsapp" onclick="shareWhatsApp()">إرسال للواتساب 🟢</button>
            </div>
        </div>
    </div>

    <footer>
        <p>صمم بواسطة <b>كريم عمر</b></p>
        <p>
            <a href="https://kemo-omar.github.io/Kareem/" target="_blank">معرض أعمالي</a> | 
            <a href="https://kemo-omar.github.io/SOHOORNA/" target="_blank">مشروع سحورنا</a>
        </p>
    </footer>

    <div class="toast" id="toast">تم النسخ بنجاح!</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, setDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyByQP42vfyZjfP8HU5SA76GKuZoH98T85o",
            authDomain: "ktaba-f5100.firebaseapp.com",
            projectId: "ktaba-f5100",
            storageBucket: "ktaba-f5100.firebasestorage.app",
            messagingSenderId: "330263583347",
            appId: "1:330263583347:web:7e0b09bad10d1f688be806"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // المرجع لمستند الإحصائيات (سنسميه april_stats)
        const statsRef = doc(db, "statistics", "april_time");

        // استماع للتحديثات الحية من فايربيز
        onSnapshot(statsRef, (doc) => {
            if (doc.exists()) {
                document.getElementById('globalCount').innerText = doc.data().totalChars.toLocaleString();
            } else {
                // إذا لم يكن المستند موجوداً، نقوم بإنشائه
                setDoc(statsRef, { totalChars: 0 });
            }
        });

        // وظيفة المعالجة الأساسية
        window.processText = async () => {
            const text = document.getElementById('inputText').value;
            const count = parseInt(document.getElementById('repeatCount').value);
            const sep = document.getElementById('separator').value.replace('\\n', '\n');
            
            if(!text) return alert("اكتب حاجة الأول يا كيمو!");

            let result = "";
            for(let i = 1; i <= count; i++) {
                let currentText = text;
                
                if(document.getElementById('optUppercase').classList.contains('active')) currentText = currentText.toUpperCase();
                if(document.getElementById('optReverse').classList.contains('active')) currentText = currentText.split('').reverse().join('');
                
                let line = document.getElementById('optNumbering').classList.contains('active') ? `${i}- ${currentText}` : currentText;
                
                result += line + (i === count ? "" : sep);
            }

            document.getElementById('resultText').value = result;
            document.getElementById('charCount').innerText = result.length;

            // تحديث فايربيز (زيادة إجمالي الحروف)
            try {
                await updateDoc(statsRef, {
                    totalChars: increment(result.length)
                });
            } catch (e) {
                console.error("Error updating stats: ", e);
            }
        };

        // وظائف إضافية
        window.copyText = () => {
            const res = document.getElementById('resultText');
            res.select();
            document.execCommand('copy');
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2000);
        };

        window.shareWhatsApp = () => {
            const text = document.getElementById('resultText').value;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        };
    </script>
</body>
</html>
